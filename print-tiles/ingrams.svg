<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Seamless steam / vapour swirls; light grey strokes on transparent -->
  <g fill="none" stroke="#ebebeb" stroke-width="1.4" stroke-linecap="round">
    <path d="M14 88 C18 70, 10 58, 18 42 C24 30, 14 22, 20 10" opacity="0.85"/>
    <path d="M28 92 C34 74, 26 62, 34 46 C40 34, 30 24, 36 8" opacity="0.55"/>
    <path d="M48 90 C52 72, 44 60, 52 44 C58 32, 48 22, 54 6" opacity="0.75"/>
    <path d="M66 94 C70 76, 62 64, 70 48 C76 36, 66 26, 72 10" opacity="0.5"/>
    <path d="M84 88 C88 70, 80 58, 88 42 C94 30, 84 22, 90 8" opacity="0.8"/>
    <!-- lighter wisps -->
    <path d="M8 70 C12 58, 6 50, 12 38" stroke-width="1" opacity="0.45"/>
    <path d="M40 76 C46 62, 38 52, 46 40" stroke-width="1" opacity="0.4"/>
    <path d="M76 72 C82 60, 74 50, 82 36" stroke-width="1" opacity="0.5"/>
    <!-- soft curls -->
    <path d="M22 50 C28 46, 30 40, 26 34" stroke-width="1.1" opacity="0.6"/>
    <path d="M58 54 C64 50, 66 44, 62 38" stroke-width="1.1" opacity="0.55"/>
    <path d="M90 48 C96 44, 98 38, 94 32" stroke-width="1.1" opacity="0.5"/>
  </g>
  <!-- wrap copies so vertical tile continues -->
  <g fill="none" stroke="#ebebeb" stroke-width="1.4" stroke-linecap="round" transform="translate(0 -100)">
    <path d="M14 88 C18 70, 10 58, 18 42" opacity="0.85"/>
    <path d="M48 90 C52 72, 44 60, 52 44" opacity="0.75"/>
    <path d="M84 88 C88 70, 80 58, 88 42" opacity="0.8"/>
  </g>
  <g fill="none" stroke="#ebebeb" stroke-width="1.4" stroke-linecap="round" transform="translate(-100 0)">
    <path d="M84 88 C88 70, 80 58, 88 42 C94 30, 84 22, 90 8" opacity="0.8"/>
  </g>
</svg>
