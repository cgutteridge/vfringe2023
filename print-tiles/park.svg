<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Seamless leaves; light grey on transparent -->
  <g fill="#ededed" stroke="#e5e5e5" stroke-width="0.6">
    <!-- leaf A -->
    <g transform="translate(20 22) rotate(-25)">
      <ellipse cx="0" cy="0" rx="7" ry="12"/>
      <path d="M0 -11 C1 -2 1 4 0 11" fill="none" stroke="#e7e7e7"/>
    </g>
    <!-- leaf B -->
    <g transform="translate(58 18) rotate(35) scale(0.85)">
      <ellipse cx="0" cy="0" rx="7" ry="12"/>
      <path d="M0 -11 C1 -2 1 4 0 11" fill="none" stroke="#e7e7e7"/>
    </g>
    <!-- leaf C -->
    <g transform="translate(78 52) rotate(-10)">
      <ellipse cx="0" cy="0" rx="6" ry="11"/>
      <path d="M0 -10 C1 -2 1 3 0 10" fill="none" stroke="#e7e7e7"/>
    </g>
    <!-- leaf D -->
    <g transform="translate(30 62) rotate(50) scale(0.9)">
      <ellipse cx="0" cy="0" rx="7" ry="12"/>
      <path d="M0 -11 C1 -2 1 4 0 11" fill="none" stroke="#e7e7e7"/>
    </g>
    <!-- leaf E -->
    <g transform="translate(62 82) rotate(-40) scale(0.75)">
      <ellipse cx="0" cy="0" rx="7" ry="12"/>
      <path d="M0 -11 C1 -2 1 4 0 11" fill="none" stroke="#e7e7e7"/>
    </g>
    <!-- leaf F small -->
    <g transform="translate(12 84) rotate(15) scale(0.6)">
      <ellipse cx="0" cy="0" rx="7" ry="12"/>
      <path d="M0 -11 C1 -2 1 4 0 11" fill="none" stroke="#e7e7e7"/>
    </g>
    <!-- wrap for seamless edges -->
    <g transform="translate(120 22) rotate(-25)">
      <ellipse cx="0" cy="0" rx="7" ry="12"/>
      <path d="M0 -11 C1 -2 1 4 0 11" fill="none" stroke="#e7e7e7"/>
    </g>
    <g transform="translate(30 162) rotate(50) scale(0.9)">
      <ellipse cx="0" cy="0" rx="7" ry="12"/>
      <path d="M0 -11 C1 -2 1 4 0 11" fill="none" stroke="#e7e7e7"/>
    </g>
  </g>
</svg>
